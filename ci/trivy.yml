# -----------------------------------------------------------------------------
# 3) Build a Kibana image with the plugin installed AND scan it. trivy-image.json
#    is artifacted so the HTML report can include image findings; enforcement is
#    recorded, not failed.
# -----------------------------------------------------------------------------
build-and-scan:image:
  extends: .trivy
  stage: "Security Scan Phase 1"
  image: "$SG_DIND_IMAGE"
  services:
    - "$SG_DIND_IMAGE"
  needs: ["scan:build", "prepare_env"]   # zip from scan:build, SF_VERSION from prepare_env
  variables:
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
    #DOCKER_BUILDKIT: "0"
  script:
    - echo "script start, SF_VERSION=$SF_VERSION"
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
    # The binary install does not bundle the contrib templates, fetch junit.tpl (version-pinned)
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/junit.tpl -o /tmp/junit.tpl
    - ls -la target/releases/
    - cp target/releases/search-guard-flx-kibana-plugin-trivy.zip ci/search-guard-flx-kibana-plugin-trivy.zip
    - cd ci
    - docker build -f Dockerfile.trivy -t "$IMAGE_TAG" --build-arg SF_VERSION="$SF_VERSION" .
    # Scan the image ONCE to JSON (absolute paths since we cd'd into ci/), then derive reports via `trivy convert`.
    # --ignore-unfixed applied here at scan time (`trivy convert` does not support it).
    - trivy image --scanners vuln,secret,misconfig --offline-scan --ignore-unfixed --format json --output "$CI_PROJECT_DIR/trivy-image.json" "$IMAGE_TAG"
    # JUnit report so each finding shows in the pipeline "Tests" tab. Non-failing.
    - trivy convert --severity $TRIVY_SEVERITY --format template --template "@/tmp/junit.tpl" --output "$CI_PROJECT_DIR/junit-trivy-image.xml" "$CI_PROJECT_DIR/trivy-image.json"
    # Enforcement pass: record gate exit code without failing the job (see scan:vuln).
    # Write to $CI_PROJECT_DIR so the artifact path resolves (cwd is ci/ here).
    - 'if trivy convert --severity $TRIVY_SEVERITY --exit-code 1 --format table "$CI_PROJECT_DIR/trivy-image.json"; then echo 0 > "$CI_PROJECT_DIR/exit_code_image.txt"; else echo $? > "$CI_PROJECT_DIR/exit_code_image.txt"; fi'
  artifacts:
    when: always
    reports:
      junit: junit-trivy-image.xml
    paths:
      - junit-trivy-image.xml
      - trivy-image.json
      - exit_code_image.txt

# -----------------------------------------------------------------------------
# 4) Build ONE interactive HTML report from deps + code + IMAGE JSON.
# -----------------------------------------------------------------------------
report:html:
  image:
    name: "aquasec/trivy:${TRIVY_VERSION}"
    entrypoint: [""]
  stage: "Security Scan Phase 1"
  needs: ["scan:vuln", "scan:code", "build-and-scan:image", "prepare_env"]
  before_script: []          # skip project groupadd/useradd (not present on trivy image)
  script:
    - 'ls trivy-vuln.json trivy-code.json >/dev/null 2>&1 || { echo "No scan JSON found; skipping report."; exit 0; }'
    # If pinning fails on your Trivy version, use: trivy plugin install scan2html
    - trivy plugin install "github.com/fatihtokus/scan2html@${SCAN2HTML_VERSION}"
    - mkdir -p public
    # Include the image results only if the image job produced them.
    - 'FROM="trivy-vuln.json,trivy-code.json"; if [ -s trivy-image.json ]; then FROM="$FROM,trivy-image.json"; fi; echo "Report sources -> $FROM"'
    - trivy scan2html generate --scan2html-flags --report-title "Trivy Security Report (Kibana ${SF_VERSION}) - ${CI_PROJECT_NAME}" --output "public/${CI_PROJECT_NAME}.html" --from "$FROM"
    - cp "public/${CI_PROJECT_NAME}.html" public/index.html
  artifacts:
    when: always
    paths:
      - public
    expire_in: 30 days

