.be_integration_test:
  extends: .dind_mirror
  allow_failure: false
  stage: "Frontend Int Tests"
  tags:
    - test-large
  rules:
    - if: '$DOCKER_ONLY || $CI_COMMIT_MESSAGE =~ /SKIP-SGI|SKIP-TESTS/'
      when: never

    - if: '$FORCE_SGI || $CI_COMMIT_MESSAGE =~ /FORCE_SGI/ || $CI_PIPELINE_SOURCE == "parent_pipeline"'
      when: always

    - if: '$CI_COMMIT_TAG =~ /^sg-flx-.*/'
      when: on_success

    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"
          || $CI_PIPELINE_SOURCE == "schedule"'
      when: on_success

  image: "$SG_DIND_IMAGE"
  script:
    - |
      set -e

      # Used when tests are triggered from another repository, e.g. search-guard-suite-enterprise.
      CHECK_JOB_NAME="${CHECK_JOB_NAME:-}"
      if [[ "${CI_PIPELINE_SOURCE:-}" == "parent_pipeline" && "${PARENT_PIPELINE_PREREQUISITES:-}" != "1" ]]; then
        if [[ -z "${CHECK_JOB_NAME}" ]]; then
          echo "ERROR: Prerequisites check finished with errors, check job undefined"
        else
          echo "ERROR: Prerequisites check finished with errors, check job \"${CHECK_JOB_NAME}\" log for more details"
        fi
        exit 1
      fi

      sudo sysctl -w vm.max_map_count=262144

      echo "Login in into Docker Hub"
      echo "$DOCKER_PASSWORD" | docker login --username floragunncom --password-stdin docker.io > /dev/null

      echo "SNAPSHOT_REVISION=$SNAPSHOT_REVISION"
      echo "TEST_DEFINITIONS $TEST_DEFINITIONS"

      echo "Running as $(id)"

      set +e

      if [ -z "${CI_JOB_TOKEN:-}" ]; then
        echo "ERROR: CI_JOB_TOKEN is empty" >&2
      fi

      echo "CI_JOB_TOKEN length: ${#CI_JOB_TOKEN}"
      if ! printf '%s' "$CI_JOB_TOKEN" | grep -qE '^[A-Za-z0-9_.-]+$'; then
        echo "ERROR: CI_JOB_TOKEN contains unexpected characters (possible truncation/corruption)"
      fi

      rm -rf sgi8
      if [ -d sgi8 ]; then
        echo "ERROR 1: sgi8 could not be fully removed - possible permission/ownership conflict:"
        ls -la sgi8

        chmod -R u+w sgi8
        rm -rf sgi8
        if [ -e sgi8 ]; then
          echo "ERROR 2: sgi8 could not be fully removed - ownership/permission conflict:"
          ls -la sgi8
          find sgi8 -exec ls -la {} \;
        fi
      fi

      # CI context that determines the job token's cross-project scope. If a merge
      # request comes from a fork, CI_MERGE_REQUEST_SOURCE_PROJECT_ID differs from
      # CI_MERGE_REQUEST_PROJECT_ID and the job token gets a reduced scope, which
      # would explain an intermittent 403 when pulling sgi8 (#215).
      echo -e "\e[0Ksection_start:$(date +%s):ci_context[collapsed=true]\r\e[0KCI context (job token scope)"
      echo "CI_PIPELINE_SOURCE=${CI_PIPELINE_SOURCE:-}"
      echo "CI_PROJECT_ID=${CI_PROJECT_ID:-} (search-guard-kibana-plugin)"
      echo "CI_JOB_ID=${CI_JOB_ID:-}  CI_JOB_STARTED_AT=${CI_JOB_STARTED_AT:-}"
      echo "CI_MERGE_REQUEST_PROJECT_ID=${CI_MERGE_REQUEST_PROJECT_ID:-}  CI_MERGE_REQUEST_SOURCE_PROJECT_ID=${CI_MERGE_REQUEST_SOURCE_PROJECT_ID:-}"
      if [ -n "${CI_MERGE_REQUEST_SOURCE_PROJECT_ID:-}" ] && \
         [ "${CI_MERGE_REQUEST_SOURCE_PROJECT_ID:-}" != "${CI_MERGE_REQUEST_PROJECT_ID:-}" ]; then
        echo "WARN: merge request originates from a FORK - job token scope is reduced, cross-project pull of sgi8 may be denied"
      fi
      echo -e "\e[0Ksection_end:$(date +%s):ci_context\r\e[0K"

      echo -e "\e[0Ksection_start:$(date +%s):verify_token[collapsed=true]\r\e[0KVerifying CI_JOB_TOKEN identity..."
      curl -sSv --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "https://git.floragunn.com/api/v4/job"
      echo -e "\e[0Ksection_end:$(date +%s):verify_token\r\e[0K"

      # The CI_JOB_TOKEN's cross-project pull permission for sgi8 (#215) is not
      # always active in the first seconds of a job, so an immediate clone can
      # get a transient 403. Retry with a short backoff, cleaning up any partial
      # checkout between attempts.
      CLONE_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@git.floragunn.com/private/sgi8.git"
      PROJECT_API="https://git.floragunn.com/api/v4/projects/215"
      attempt=1
      MAX_ATTEMPTS=5
      CLONE_PHASE_START=$(date +%s)
      until git clone --depth 1 --branch "$IT_BRANCH" "$CLONE_URL"; do
        elapsed=$(( $(date +%s) - CLONE_PHASE_START ))
        # Probe whether the job token can see sgi8 (#215) yet - correlates
        # permission propagation with clone success/failure over time.
        probe=$(curl -s -o /dev/null -w '%{http_code}' --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "$PROJECT_API" || echo "000")
        echo "WARN: clone attempt ${attempt} failed after ${elapsed}s; /projects/215 -> HTTP ${probe} (token permissions may not have propagated yet)" >&2
        if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
          echo "ERROR: git clone of sgi8 failed after ${MAX_ATTEMPTS} attempts (${elapsed}s total)" >&2
          exit 1
        fi
        rm -rf sgi8
        sleep $((attempt * 5))
        attempt=$((attempt + 1))
      done
      echo "sgi8 cloned successfully on attempt ${attempt} after $(( $(date +%s) - CLONE_PHASE_START ))s"

      set -e

      # fail if sgi8/server does not exist
      if [ ! -d sgi8/server ]; then
        echo "ERROR: sgi8/server does not exist after clone"
        exit 1
      fi

      cd sgi8/server
      rm -f docker/kibana/kibana-plugin.zip docker/elasticsearch/search-guard.zip

      wget -O docker/elasticsearch/search-guard.zip "$SG_ES_PLUGIN"

      # Used when tests are triggered from another repository, e.g. search-guard-suite-enterprise.
      if [[ "${CI_PIPELINE_SOURCE:-}" == "parent_pipeline" ]]; then
        echo "Test was triggered from the parent pipeline, downloading SG_KI_PLUGIN from URL: $SG_KI_PLUGIN"
        wget -O docker/kibana/kibana-plugin.zip "$SG_KI_PLUGIN"
      else
        echo "Using local kibana plugin from target/releases"
        cp "../../target/releases/search-guard-flx-kibana-plugin-${BUILD_VERSION}.zip" \
          docker/kibana/kibana-plugin.zip
      fi

      ./run_test_definition.sh "$TEST_DEFINITIONS"
  after_script:
    - |
      if [ -n "$KEEP_TEST_ARTIFACTS" ]; then
        echo "KEEP_TEST_ARTIFACTS is set - skipping artifact cleanup"
      elif [ "$CI_JOB_STATUS" == "success" ]; then
        echo "Job succeeded - removing heavy artifacts, keeping JUnit XML only"
        find sgi8/client/test/testresults* -type f ! -path "*/junit/*.xml" -delete 2>/dev/null || true
        find sgi8/client/test/testresults* -type d -empty -delete 2>/dev/null || true
      else
        echo "Job failed - keeping all artifacts for debugging"
      fi
  artifacts:
    when: always
    paths:
      - sgi8/client/test/testresults**/**/*
    reports:
      junit:
        - "sgi8/client/test/testresults**/junit/Test*.xml"
    expire_in: 7 days
